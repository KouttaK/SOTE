<div
  id="modal-container"
  class="modal-container hidden"
  role="dialog"
  aria-labelledby="modal-title"
  aria-modal="true"
>
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Adicionar Nova Abreviação</h2>
      <button id="modal-close" class="modal-close" aria-label="Fechar modal">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group" style="grid-column: span 2;">
          <label for="abbreviation"
            >Abreviação <span class="required">*</span></label
          >
          <input
            type="text"
            id="abbreviation"
            placeholder="Ex: tdb, vlw"
            required
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label for="expansion"
            >Expansão <span class="required">*</span></label
          >
          <textarea
            id="expansion"
            placeholder="Ex: tudo bem, valeu"
            required
            rows="4"
            spellcheck="false"
          ></textarea>
          <div class="action-buttons-container">
            <button
              type="button"
              class="btn-insert-action"
              data-action="$cursor$"
              title="Posiciona o cursor de texto aqui após a expansão"
            >
              📍 Posição do Cursor
            </button>
            <button
              type="button"
              class="btn-insert-action"
              data-action="$transferencia$"
              title="Insere o conteúdo atual da área de transferência"
            >
              📋 Área de Transferência
            </button>
            <button
              type="button"
              class="btn-insert-action"
              id="btn-insert-choice"
              title="Insere uma escolha com múltiplas opções"
            >
              ❓ Inserir Nova Escolha
            </button>
            <button
              type="button"
              class="btn-insert-action hidden"
              id="btn-edit-choice"
              title="Edita a escolha existente nesta expansão"
            >
              ✏️ Editar Escolha
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="category">Categoria</label>
          <select id="category">
            <option value="Comum">Comum</option>
            <option value="Pessoal">Pessoal</option>
            <option value="Trabalho">Trabalho</option>
            <option value="Personalizada">Personalizada</option>
          </select>
        </div>
        <div
          class="form-group"
          id="custom-category-input-container"
          style="display: none;"
        >
          <label for="custom-category">Nome da Categoria Personalizada</label>
          <input
            type="text"
            id="custom-category"
            placeholder="Ex: Estudos"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="form-group checkbox">
          <input type="checkbox" id="case-sensitive" />
          <label for="case-sensitive">Diferenciar maiúsculas/minúsculas</label>
        </div>
        <div class="form-group checkbox">
          <input type="checkbox" id="enabled" checked />
          <label for="enabled">Habilitado</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="modal-cancel" class="btn cancel-btn" type="button">
        Cancelar
      </button>
      <button id="modal-save" class="btn save-btn" type="button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="20,6 9,17 4,12"></polyline>
        </svg>
        Salvar
      </button>
    </div>
  </div>
</div>
