<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sote - Painel de Controle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="logo">
          <div class="logo-icon" aria-hidden="true">S</div>
          <div class="logo-text">
            <h1>Sote</h1>
            <span class="subtitle">Painel de Controle - Expansor de Texto</span>
          </div>
        </div>
        <div class="header-actions">
          <div class="toggle-container">
            <label class="toggle" for="enabled-toggle">
              <input
                type="checkbox"
                id="enabled-toggle"
                checked
                aria-describedby="status-text"
              />
              <span class="toggle-slider" aria-hidden="true"></span>
              <span class="sr-only">Alternar ativação do expansor</span>
            </label>
            <span id="status-text" role="status" aria-live="polite"
              >Habilitado</span
            >
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="container">
        <div class="dashboard-grid">
          <aside class="sidebar">
            <div class="sidebar-section">
              <h2>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M4 6h16M4 12h16M4 18h7"></path>
                </svg>
                Categorias
              </h2>
              <ul class="category-list" id="category-list" role="list">
                <li
                  class="category-item active"
                  data-category="all"
                  role="listitem"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <rect
                      x="3"
                      y="3"
                      width="18"
                      height="18"
                      rx="2"
                      ry="2"
                    ></rect>
                    <path d="M9 9h6v6H9z"></path>
                  </svg>
                  <span>Todas</span>
                </li>
              </ul>
            </div>
            <div class="sidebar-section">
              <h2>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l-.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
                  ></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                Ferramentas
              </h2>
              <ul class="tools-list" role="list">
                <li
                  class="tools-item"
                  id="import-btn"
                  role="listitem"
                  tabindex="0"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                  </svg>
                  <span>Importar Dados</span>
                </li>
                <li
                  class="tools-item"
                  id="export-btn"
                  role="listitem"
                  tabindex="0"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                  <span>Exportar Tudo</span>
                </li>
                <li
                  class="tools-item"
                  id="export-selected-btn"
                  role="listitem"
                  tabindex="0"
                  style="display: none;"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                    <path
                      d="M16 5h2a2 2 0 0 1 2 2v2M8 5H6a2 2 0 0 0-2 2v2"
                    ></path>
                  </svg>
                  <span>Exportar Selecionadas</span>
                </li>
                <li
                  class="tools-item"
                  id="export-category-btn"
                  role="listitem"
                  tabindex="0"
                  style="display: none;"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                  <span>Exportar Categoria</span>
                </li>
                <li
                  class="tools-item"
                  id="settings-btn"
                  role="listitem"
                  tabindex="0"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                      d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                    ></path>
                  </svg>
                  <span>Configurações</span>
                </li>
              </ul>
            </div>
          </aside>

          <section class="content">
            <div class="content-header">
              <div class="search-container">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="search-icon"
                  aria-hidden="true"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input
                  type="text"
                  id="search-input"
                  placeholder="Buscar abreviações..."
                  aria-label="Buscar abreviações"
                  autocomplete="off"
                  spellcheck="false"
                />
              </div>
              <button id="add-btn" class="add-btn" type="button">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>Adicionar Nova</span>
              </button>
            </div>

            <div class="content-body">
              <div class="table-container">
                <table
                  class="abbreviations-table"
                  role="table"
                  aria-label="Tabela de abreviações"
                >
                  <thead>
                    <tr role="row">
                      <th class="checkbox-cell">
                        <input
                          type="checkbox"
                          id="select-all-checkbox"
                          aria-label="Selecionar todas as abreviações"
                        />
                      </th>
                      <th
                        class="sortable"
                        data-sort="abbreviation"
                        role="columnheader"
                        tabindex="0"
                        aria-sort="none"
                      >
                        Abreviação
                      </th>
                      <th role="columnheader">Expansão</th>
                      <th
                        class="sortable"
                        data-sort="category"
                        role="columnheader"
                        tabindex="0"
                        aria-sort="none"
                      >
                        Categoria
                      </th>
                      <th
                        class="sortable"
                        data-sort="usageCount"
                        role="columnheader"
                        tabindex="0"
                        aria-sort="none"
                      >
                        Uso
                      </th>
                      <th
                        class="sortable"
                        data-sort="lastUsed"
                        role="columnheader"
                        tabindex="0"
                        aria-sort="none"
                      >
                        Último Uso
                      </th>
                      <th role="columnheader">Regras</th>
                      <th role="columnheader">Ações</th>
                    </tr>
                  </thead>
                  <tbody id="abbreviations-list" role="rowgroup">
                    <tr role="row">
                      <td colspan="8" class="loading">
                        <div class="loading-spinner" aria-hidden="true"></div>
                        Carregando abreviações...
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <div id="modal-placeholder"></div>

    <script src="../utils/constants.js"></script>
    <script src="../utils/db.js"></script>
    <script src="../utils/cache.js"></script>
    <script src="../utils/notifier.js"></script>
    <script src="../utils/confirmationModal.js"></script>
    <script src="../utils/store.js"></script>
    <script src="store.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
